<!DOCTYPE html>
<html lang="pt-BR">

  <title>Alpha Prime</title>

<body>

  <section class="hero">

    </video>

    <div class="hero-overlay"></div>

    <div class="hero-content">
      <h1>REFERÊNCIA E QUALIDADE</h1>

      <p>

      <a href="#" class="hero-button">AGENDE SEU HORÁRIO</a>

    <div class="hero-social">
        <a href="#">
        <svg class="social-icon icon-whatsapp" aria-label="WhatsApp">

        <a href="#">
        <svg class="social-icon icon-instagram" aria-label="Instagram">

        </a>
        <a href="#">
        <svg class="social-icon icon-tiktok" aria-label="TikTok">
            <use href="assets/icons/sprite.svg#icon-tiktok"></use>
        </svg>
        </a>
        <a href="#">
        <svg class="social-icon icon-facebook" aria-label="Facebook">
            <use href="assets/icons/sprite.svg#icon-facebook"></use>
        </svg>
        </a>
        <a href="#">
